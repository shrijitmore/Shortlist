steps:
  # Build the Docker image from apps/backend/Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/shortlist-backend
      - apps/backend

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/$PROJECT_ID/shortlist-backend

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - shortlist
      - --image=gcr.io/$PROJECT_ID/shortlist-backend
      - --region=asia-south1
      - --memory=1Gi
      - --port=8080
      - --allow-unauthenticated

images:
  - gcr.io/$PROJECT_ID/shortlist-backend
